# fly.toml file generated for sudoku-solver-api

app = "sudoku-solver-api"
kill_signal = "SIGINT"
kill_timeout = 5
primary_region = "fra"
processes = []

[env]
  PORT = "3005"
  API_BASE_URL = "https://sudoku-solver-api.fly.dev"

[experimental]
  auto_rollback = true

[[services]]
  http_checks = []
  internal_port = 3005
  processes = ["app"]
  protocol = "tcp"
  script_checks = []
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"
